<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f7;
    }
    
    #test-button {
      padding: 12px 24px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    #test-button:hover {
      background: #0077ed;
      transform: scale(1.05);
    }
    
    #game-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    
    .modal-content {
      width: 400px;
      height: 700px;
      background: rgba(28, 28, 30, 0.8);
      border-radius: 14px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    #close-modal {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 1001;
      background: rgba(60, 60, 67, 0.6);
      color: #fff;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
    }
    
    h3 {
      margin: 0;
      padding: 16px 20px;
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <h1>Game Test</h1>
  <p>Click the button below to open the game modal</p>
  <button id="test-button">Open Game</button>
  
  <div id="game-modal">
    <div class="modal-content">
      <button id="close-modal">✕</button>
      <h3>EEG Brain Games</h3>
      <iframe id="game-iframe" src="about:blank" style="width: 100%; height: calc(100% - 56px); border: none; background: transparent;" allow="accelerometer; autoplay; encrypted-media; gyroscope;" allowfullscreen></iframe>
    </div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const testButton = document.getElementById('test-button');
      const gameModal = document.getElementById('game-modal');
      const closeModal = document.getElementById('close-modal');
      const gameIframe = document.getElementById('game-iframe');
      
      testButton.addEventListener('click', function() {
        // Force iframe reload
        gameIframe.src = 'about:blank';
        
        setTimeout(() => {
          gameIframe.src = 'flappy_brain/menu.html';
          gameModal.style.display = 'flex';
          
          setTimeout(() => {
            gameIframe.focus();
          }, 100);
          
          console.log('Game modal opened');
        }, 10);
      });
      
      closeModal.addEventListener('click', function() {
        gameModal.style.display = 'none';
        console.log('Game modal closed');
      });
      
      gameModal.addEventListener('click', function(e) {
        if (e.target === gameModal) {
          gameModal.style.display = 'none';
          console.log('Game modal background clicked');
        }
      });
    });
  </script>
</body>
</html>
