<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discussion Forum - EEG Training</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    /* Additional custom styling for the discussion forum page */
    .page-title {
      text-align: center;
      margin: 2rem 0;
      font-size: 2.5rem;
      color: var(--primary-color);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
    }
    .description {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      color: var(--text-color);
    }
    .disclaimer {
      background: #ffecec;
      border: 1px solid #ff5c5c;
      color: #a94442;
      font-weight: bold;
      padding: 1rem;
      margin: 1rem auto;
      max-width: 800px;
      text-align: center;
      border-radius: 8px;
    }
    /* Optional: Adjust the Disqus container size to better match your site's layout */
    #disqus_thread {
      margin: 2rem auto;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <header>
    <!-- Insert your website header/navigation here -->
  </header>
  <main class="container">
    <h2 class="page-title">Discussion Forum</h2>
    <p class="description">
      Join the conversation below and share your insights on EEG findings!
      Please review our <a href="https://www.eeg-training.com/comment-policy.html" target="_blank">Comment Policy</a> before posting.
    </p>
    <!-- Disclaimer -->
    <div class="disclaimer">
      <p><strong>Disclaimer:</strong> Do not upload any Protected Health Information (PHI) or HIPAA-sensitive material. All submissions are for educational purposes only.</p>
    </div>
    <!-- Disqus Comment Thread Container -->
    <div id="disqus_thread"></div>
    <noscript>
      Please enable JavaScript to view the comments powered by Disqus.
    </noscript>
  </main>
  <footer>
    <!-- Insert your website footer content here -->
  </footer>

  <!-- Disqus Comment Count Script -->
  <script id="dsq-count-scr" src="https://eeg-training.disqus.com/count.js" async></script>
