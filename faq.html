<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Responsive scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discussion Forum - EEG Curriculum</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
  <link rel="apple-touch-icon" href="assets/images/logo.png" />
  <link rel="manifest" href="manifest.json">
  
  <!-- Main CSS file that imports all modular CSS -->
  <link rel="stylesheet" href="assets/css/main.css" />
  
  <!-- Core Scripts -->
  <script src="assets/js/common.js" defer></script>
  <script src="assets/js/includes-loader.js" defer></script>
  <script src="assets/js/universal-search.js" defer></script>
</head>
<body>
  <!-- Include Header -->
  <div id="header-container"></div>

  <!-- Main Content -->
  <main>
    <h2 class="page-title">Discussion Forum</h2>
    <div class="info-box">
      <p class="description">
        Join the conversation below and share your insights on EEG findings!
        Please review our <a href="https://www.eeg-training.com/comment-policy.html" target="_blank">Comment Policy</a> before posting.
      </p>
      <!-- Disclaimer Box -->
      <div class="disclaimer">
        <p><strong>Disclaimer:</strong> Do not upload any Protected Health Information (PHI) or HIPAA-sensitive material. All posts are for educational purposes only.</p>
      </div>
      <!-- Disqus Comment Thread Container -->
      <div id="disqus_thread"></div>
      <noscript>
        Please enable JavaScript to view the comments powered by Disqus.
      </noscript>
    </div>
  </main>

  <!-- Include Footer -->
  <div id="footer-container"></div>

  <!-- Include Disclaimer -->
  <div id="disclaimer-container"></div>

  <!-- Include Copyright -->
  <div id="copyright-container"></div>

  <script>
    // Disqus Universal Configuration
    var disqus_config = function () {
      this.page.url = window.location.href;  
      this.page.identifier = "discussion_forum"; 
    };
    
    // Disqus loading will be handled by the authentication script
  </script>
  <!-- Disqus Comment Count Script (if needed) -->
  <script id="dsq-count-scr" src="https://eeg-training.disqus.com/count.js" async></script>
</body>
</html>
