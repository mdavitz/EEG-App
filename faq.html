<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discussion Forum - EEG Training</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    /* Wrap the entire content in a boxed container to match other pages */
    .boxed-container {
      background: var(--info-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 2px 8px var(--shadow-color);
      margin: 2rem auto;
      padding: 2rem;
      max-width: 800px;
    }
    .page-title {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 2.5rem;
      color: var(--primary-color);
    }
    .description {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      color: var(--text-color);
    }
    .disclaimer {
      background: #ffecec;
      border: 1px solid #ff5c5c;
      color: #a94442;
      font-weight: bold;
      padding: 1rem;
      margin: 1rem 0;
      text-align: center;
      border-radius: 8px;
    }
    /* Optional: adjust Disqus container size if needed */
    #disqus_thread {
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <header>
    <!-- Insert your site's header/navigation here -->
  </header>
  <h2 class="page-title">Discussion Forum</h2>
  <main class="container">
    <div class="boxed-container">
      <p class="description">
        Join the conversation below and share your insights on EEG findings!
        Please review our <a href="https://www.eeg-training.com/comment-policy.html" target="_blank">Comment Policy</a> before posting.
      </p>
      <!-- Disclaimer Box -->
      <div class="disclaimer">
        <p><strong>Disclaimer:</strong> Do not upload any Protected Health Information (PHI) or HIPAA-sensitive material. All posts are for educational purposes only.</p>
      </div>
      <!-- Disqus Comment Thread Container -->
      <div id="disqus_thread"></div>
      <noscript>
        Please enable JavaScript to view the comments powered by Disqus.
      </noscript>
    </div>
  </main>
  <footer>
    <!-- Insert your website footer content here -->
  </footer>
  
  <!-- Disqus Universal Embed Code -->
  <script>
    /**
    * RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES
    * FROM YOUR PLATFORM OR CMS.
    *
    * var disqus_config = function () {
    *   this.page.url = window.location.href;  
    *   this.page.identifier = "discussion_forum"; 
    * };
    */
    (function() {  // DON'T EDIT BELOW THIS LINE
      var d = document, s = d.createElement('script');
      s.src = 'https://eeg-training.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <!-- Disqus Comment Count Script (if needed) -->
  <script id="dsq-count-scr" src="https://eeg-training.disqus.com/count.js" async></script>
</body>
</html>
