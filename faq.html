<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Forum - EEG Training</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    /* Container to center and box the content */
    .boxed-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--info-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 2px 8px var(--shadow-color);
    }
    .page-title {
      text-align: center;
      margin-bottom: 1rem;
      font-size: 2.5rem;
      color: var(--primary-color);
    }
    .description {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      color: var(--text-color);
    }
    .iframe-container {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow-color);
    }
    .iframe-container iframe {
      width: 100%;
      height: 800px; /* Adjust height as needed */
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <!-- Insert your header/navigation here -->
  </header>
  <main class="container">
    <div class="boxed-container">
      <h2 class="page-title">Community Forum</h2>
      <p class="description">
        Join our community forum for discussions and insights on EEG Training.
        For more details, please review our <a href="https://www.eeg-training.com/comment-policy.html" target="_blank">Comment Policy</a>.
      </p>
      <div class="iframe-container">
        <iframe src="https://connect.aesnet.org/communities/community-home?communitykey=9717275e-6822-4a93-a50f-0192906123ca">
          Your browser does not support iframes.
        </iframe>
      </div>
    </div>
  </main>
  <footer>
    <!-- Insert your footer content here -->
  </footer>
</body>
</html>
