<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- Force retro 320x480 layout -->
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>Game Menu</title>
  <!-- Load the retro 8-bit font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      background: black;
      border: 4px solid #0f0;
      box-shadow: 0 0 10px #0f0;
    }
  </style>
</head>
<body>
  <canvas id="menuCanvas" width="320" height="480"></canvas>
  <script>
    const canvas = document.getElementById("menuCanvas");
    const ctx = canvas.getContext("2d");

    // Define two button objects.
    // Each button has x, y, width, height and a target URL.
    const buttons = [
      { text: "Flappy Brain", x: 35, y: 150, width: 250, height: 60, target: "flappy_brain.html" },
      { text: "Galactibrain", x: 35, y: 260, width: 250, height: 60, target: "galactibrain.html" }
    ];

    // Draw the two buttons with an 8-bit style.
    function drawMenu() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Optional: Draw a small title above the buttons.
      ctx.fillStyle = "#0f0";
      ctx.font = "18px 'Press Start 2P'";
      ctx.textAlign = "center";
      ctx.fillText("Select Game", canvas.width/2, 70);
      
      // Draw each button.
      buttons.forEach(btn => {
        // Draw an 8-bit styled rectangle.
        ctx.strokeStyle = "#0f0";
        ctx.lineWidth = 4;
        ctx.strokeRect(btn.x, btn.y, btn.width, btn.height);
        // Optionally, fill a dark background inside the button.
        ctx.fillStyle = "black";
        ctx.fillRect(btn.x, btn.y, btn.width, btn.height);
        // Draw the button text.
        ctx.fillStyle = "#0f0";
        ctx.font = "14px 'Press Start 2P'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(btn.text, btn.x + btn.width / 2, btn.y + btn.height / 2);
      });
    }

    drawMenu();

    // Helper function to get canvas coordinates from an event.
    function getCanvasCoordinates(e) {
      const rect = canvas.getBoundingClientRect();
      let x, y;
      if (e.touches) {
        x = e.touches[0].clientX - rect.left;
        y = e.touches[0].clientY - rect.top;
      } else {
        x = e.clientX - rect.left;
        y = e.clientY - rect.top;
      }
      return { x, y };
    }

    // Handle selection: if a click/tap falls within a button, navigate to its target.
    function handleSelection(e) {
      const pos = getCanvasCoordinates(e);
      buttons.forEach(btn => {
        if (
          pos.x >= btn.x && pos.x <= btn.x + btn.width &&
          pos.y >= btn.y && pos.y <= btn.y + btn.height
        ) {
          window.location.href = btn.target;
        }
      });
    }

    canvas.addEventListener("click", handleSelection);
    canvas.addEventListener("touchstart", handleSelection);
  </script>
</body>
</html>
