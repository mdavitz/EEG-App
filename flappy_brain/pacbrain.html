<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- Fixed viewport so canvas stays 320px wide -->
  <meta name="viewport" content="width=320, initial-scale=1.0, user-scalable=no">
  <title>Pacbrain Forced Start</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    canvas {
      background: url('space-background.jpg') no-repeat center center / cover;
      border: 2px solid #0f0;
      box-shadow: 0 0 10px #0f0;
    }
    #scoreBoard {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #0f0;
      font-family: sans-serif;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="320" height="480"></canvas>
  <div id="scoreBoard">Score: 0 | Level: 1</div>
  <script>
    // --- SETUP ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreBoard = document.getElementById("scoreBoard");

    // Log that the script is running.
    console.log("Script started.");

    // --- ASSETS ---
    const pacbrainImg = new Image();
    pacbrainImg.src = "bird.png";
    pacbrainImg.onerror = () => console.error("Error loading bird.png");

    const ghostImg = new Image();
    ghostImg.src = "neuron.png";
    ghostImg.onerror = () => console.error("Error loading neuron.png");

    // --- GAME CONFIG ---
    // Force game state to "playing" immediately.
    let gameState = "playing";
    let score = 0;
    let level = 1;
    const maxLevels = 10;

    // --- MAZE CONFIGURATION ---
    // We'll use a 40×50 maze (each tile is 16×16) to create a larger world.
    const tileSize = 16;
    const mazeCols = 40;
    const mazeRows = 50;
    let maze = [];
    let pelletsLeft = 0;
    // Maze codes: 0 = empty, 1 = wall, 2 = pellet, 3 = power pellet

    // --- GAME OBJECTS ---
    // We store Pacbrain's position in pixel coordinates.
    const pacman = {
      x: 10 * tileSize,  // start at column 10
      y: 22 * tileSize,  // start at row 22
      size: 48,          // draw bird.png at 48×48 (larger)
      speed: 2           // pixels per frame
    };

    // Ghosts use pixel coordinates as well.
    let ghosts = [];
    const VULNERABLE_DURATION = 300; // frames

    // Camera to keep Pacman centered.
    const camera = { x: 0, y: 0 };

    // --- INPUT STATE ---
    const keys = { up: false, down: false, left: false, right: false };

    // --- MAZE CREATION FUNCTION ---
    function createMaze() {
      maze = [];
      pelletsLeft = 0;
      for (let r = 0; r < mazeRows; r++) {
        let row = [];
        for (let c = 0; c < mazeCols; c++) {
          // Create border walls.
          if (r === 0 || r === mazeRows - 1 || c === 0 || c === mazeCols - 1) {
            row.push(1);
          } else {
            let rand = Math.random();
            if (rand < 0.2) {
              row.push(1);
            } else if (rand < 0.95) {
              row.push(2);
              pelletsLeft++;
            } else {
              row.push(3);
              pelletsLeft++;
            }
          }
        }
        maze.push(row);
      }
      // Clear a safe area around pacman's starting tile.
      let startRow = Math.floor(pacman.y / tileSize);
      let startCol = Math.floor(pacman.x / tileSize);
      for (let r = startRow - 2; r <= startRow + 2; r++) {
        for (let c = startCol - 2; c <= startCol + 2; c++) {
          if (maze[r][c] === 2 || maze[r][c] === 3) pelletsLeft--;
          maze[r][c] = 0;
        }
      }
      console.log("Maze created. Pellets left:", pelletsLeft);
    }

    // --- RESET GAME FUNCTION ---
    function resetGame() {
      createMaze();
      // Reset Pacman's position.
      pacman.x = 10 * tileSize;
      pacman.y = 22 * tileSize;
      ghosts = [];
      // Spawn ghosts (increase with level, max 4).
      const numGhosts = Math.min(4, level);
      for (let i = 0; i < numGhosts; i++) {
        ghosts.push({
          x: 10 * tileSize,
          y: (5 + i * 2) * tileSize,
          speed: 1 + level * 0.2,
          vulnerable: false,
          vulnerableTimer: 0
        });
      }
      updateScoreBoard();
      console.log("Game reset. Level:", level);
    }

    function updateScoreBoard() {
      scoreBoard.textContent = `Score: ${score} | Level: ${level}`;
    }

    // --- CAMERA UPDATE FUNCTION ---
    function updateCamera() {
      // Center the camera on pacman.
      let targetX = pacman.x - canvas.width / 2 + pacman.size / 2;
      let targetY = pacman.y - canvas.height / 2 + pacman.size / 2;
      // Clamp so camera doesn't go off the maze.
      camera.x = Math.max(0, Math.min(targetX, mazeCols * tileSize - canvas.width));
      camera.y = Math.max(0, Math.min(targetY, mazeRows * tileSize - canvas.height));
    }

    // --- DRAWING FUNCTIONS ---
    function drawMaze() {
      for (let r = 0; r < mazeRows; r++) {
        for (let c = 0; c < mazeCols; c++) {
          let cell = maze[r][c];
          let screenX = c * tileSize - camera.x;
          let screenY = r * tileSize - camera.y;
          // Only draw if on screen.
          if (screenX + tileSize < 0 || screenY + tileSize < 0 ||
              screenX > canvas.width || screenY > canvas.height)
            continue;
          if (cell === 1) {
            ctx.fillStyle = "#0000ff";
            ctx.fillRect(screenX, screenY, tileSize, tileSize);
          } else if (cell === 2) {
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(screenX + tileSize/2, screenY + tileSize/2, 2, 0, Math.PI*2);
            ctx.fill();
          } else if (cell === 3) {
            ctx.fillStyle = "#ff0";
            ctx.beginPath();
            ctx.arc(screenX + tileSize/2, screenY + tileSize/2, 4, 0, Math.PI*2);
            ctx.fill();
          }
        }
      }
    }

    function drawPacman() {
      let screenX = pacman.x - camera.x;
      let screenY = pacman.y - camera.y;
      if (!pacbrainImg.complete) {
        ctx.fillStyle = "#ff0";
        ctx.fillRect(screenX, screenY, pacman.size, pacman.size);
      } else {
        // Draw bird.png at 48x48.
        ctx.drawImage(pacbrainImg, screenX, screenY, pacman.size, pacman.size);
      }
    }

    function drawGhosts() {
      ghosts.forEach(ghost => {
        let screenX = ghost.x - camera.x;
        let screenY = ghost.y - camera.y;
        if (!ghostImg.complete) {
          ctx.fillStyle = ghost.vulnerable ? "#00f" : "#f0f";
          ctx.fillRect(screenX, screenY, tileSize, tileSize);
        } else {
          if (ghost.vulnerable) {
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = "#00f";
            ctx.fillRect(screenX, screenY, tileSize, tileSize);
            ctx.globalAlpha = 1.0;
          }
          ctx.drawImage(ghostImg, screenX, screenY, tileSize, tileSize);
        }
      });
    }

    // --- UTILITY: Check if a pixel position is inside a wall.
    function isWallPixel(x, y) {
      let col = Math.floor(x / tileSize);
      let row = Math.floor(y / tileSize);
      if (row < 0 || row >= mazeRows || col < 0 || col >= mazeCols) return true;
      return maze[row][col] === 1;
    }

    // --- UPDATE PACMAN MOVEMENT ---
    function updatePacman() {
      let vx = 0, vy = 0;
      if (keys.up) vy = -pacman.speed;
      if (keys.down) vy = pacman.speed;
      if (keys.left) vx = -pacman.speed;
      if (keys.right) vx = pacman.speed;
      let newX = pacman.x + vx;
      let newY = pacman.y + vy;
      // Check the center of Pacman for wall collision.
      if (!isWallPixel(newX + pacman.size/2, newY + pacman.size/2)) {
        pacman.x = newX;
        pacman.y = newY;
      }
      // Determine which maze cell Pacman's center is in.
      let centerX = pacman.x + pacman.size/2;
      let centerY = pacman.y + pacman.size/2;
      let col = Math.floor(centerX / tileSize);
      let row = Math.floor(centerY / tileSize);
      if (maze[row] && maze[row][col] !== undefined) {
        let cell = maze[row][col];
        if (cell === 2) {
          maze[row][col] = 0;
          pelletsLeft--;
          score += 10;
          updateScoreBoard();
        } else if (cell === 3) {
          maze[row][col] = 0;
          pelletsLeft--;
          score += 50;
          // Activate power-up: make all ghosts vulnerable.
          ghosts.forEach(g => {
            g.vulnerable = true;
            g.vulnerableTimer = VULNERABLE_DURATION;
          });
          updateScoreBoard();
        }
      }
    }

    // --- UPDATE GHOSTS MOVEMENT ---
    function updateGhosts() {
      ghosts.forEach(ghost => {
        if (ghost.vulnerable) {
          ghost.vulnerableTimer--;
          if (ghost.vulnerableTimer <= 0) ghost.vulnerable = false;
        }
        // Simple chasing: move a fraction toward Pacman.
        let dx = pacman.x - ghost.x;
        let dy = pacman.y - ghost.y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
        ghost.x += (dx / dist) * ghost.speed;
        ghost.y += (dy / dist) * ghost.speed;
      });
    }

    // --- CHECK COLLISIONS BETWEEN PACMAN AND GHOSTS ---
    function checkCollisions() {
      ghosts.forEach((ghost, index) => {
        let dx = (pacman.x + pacman.size/2) - (ghost.x + tileSize/2);
        let dy = (pacman.y + pacman.size/2) - (ghost.y + tileSize/2);
        if (Math.sqrt(dx*dx + dy*dy) < 16) {
          if (ghost.vulnerable) {
            score += 200;
            ghosts.splice(index, 1);
            updateScoreBoard();
          } else {
            gameState = "gameover";
            gameOverScreen.style.display = "block";
          }
        }
      });
    }

    // --- CHECK LEVEL COMPLETE ---
    function checkLevelComplete() {
      if (pelletsLeft <= 0) {
        level++;
        if (level > maxLevels) {
          alert("You win the game!");
          level = 1;
          score = 0;
        }
        resetGame();
      }
    }

    // --- GAME LOOP ---
    function gameLoop() {
      if (gameState === "playing") {
        updatePacman();
        updateGhosts();
        checkCollisions();
        checkLevelComplete();
        updateCamera();
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawMaze();
      drawPacman();
      drawGhosts();
      updateScoreBoard();
      requestAnimationFrame(gameLoop);
    }

    // --- INPUT HANDLERS ---
    document.addEventListener("keydown", (e) => {
      if (gameState === "menu") {
        if (e.code === "Space") {
          resetGame();
          gameState = "playing";
          startScreen.style.display = "none";
        }
        return;
      }
      if (gameState === "gameover") {
        if (e.code === "Space") {
          resetGame();
          gameState = "playing";
          gameOverScreen.style.display = "none";
        }
        return;
      }
      switch (e.key) {
        case "ArrowUp":    keys.up = true; break;
        case "ArrowDown":  keys.down = true; break;
        case "ArrowLeft":  keys.left = true; break;
        case "ArrowRight": keys.right = true; break;
      }
    });
    document.addEventListener("keyup", (e) => {
      switch (e.key) {
        case "ArrowUp":    keys.up = false; break;
        case "ArrowDown":  keys.down = false; break;
        case "ArrowLeft":  keys.left = false; break;
        case "ArrowRight": keys.right = false; break;
      }
    });
    // Allow canvas click/tap to restart if game over.
    canvas.addEventListener("click", () => {
      if (gameState === "menu" || gameState === "gameover") {
        resetGame();
        gameState = "playing";
        startScreen.style.display = "none";
        gameOverScreen.style.display = "none";
      }
    });
    canvas.addEventListener("touchstart", () => {
      if (gameState === "menu" || gameState === "gameover") {
        resetGame();
        gameState = "playing";
        startScreen.style.display = "none";
        gameOverScreen.style.display = "none";
      }
    });

    // --- MENU / START SCREEN ---
    function showMenu() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0f0";
      ctx.font = "16px 'Press Start 2P'";
      ctx.textAlign = "center";
      ctx.fillText("Press Space or tap to Start", canvas.width/2, canvas.height/2);
      // Also display the start screen overlay.
      // (You can style this div via CSS.)
      document.getElementById("startScreen").style.display = "block";
    }

    // --- STARTUP ---
    // Wait for images to load, but force start after 3 seconds if needed.
    let imagesLoaded = 0;
    function checkImagesLoaded() {
      imagesLoaded++;
      if (imagesLoaded >= 2) {
        if (gameState === "menu") showMenu();
        gameLoop();
      }
    }
    pacbrainImg.onload = checkImagesLoaded;
    ghostImg.onload = checkImagesLoaded;
    setTimeout(() => {
      if (imagesLoaded < 2) {
        console.warn("Forcing game start without images");
        if (gameState === "menu") showMenu();
        gameLoop();
      }
    }, 3000);

    // Start in menu state.
    showMenu();
  </script>
</body>
</html>
