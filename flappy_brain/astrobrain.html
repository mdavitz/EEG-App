<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Astrobrain – Upgraded Asteroids</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      position: relative;
    }
    /* Canvas fallback background */
    canvas {
      background: url('space-background.jpg') no-repeat center center / cover;
      border: 2px solid #0f0;
      box-shadow: 0 0 10px #0f0;
    }
    /* Joystick and shoot button for mobile */
    #joystick, #shootButton {
      position: absolute;
      bottom: 10%;
      touch-action: none;
    }
    #joystick {
      left: 10%;
      width: 80px;
      height: 80px;
      background: rgba(0,255,0,0.5);
      border-radius: 50%;
    }
    #shootButton {
      right: 10%;
      width: 60px;
      height: 60px;
      background: rgba(255,0,0,0.5);
      border-radius: 50%;
      font-size: 16px;
      color: white;
      text-align: center;
      line-height: 60px;
      font-family: 'Press Start 2P', monospace;
      border: none;
    }
    /* Hide on desktop */
    @media (min-width: 600px) {
      #joystick, #shootButton {
        display: none;
      }
    }
    #scoreBoard {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #0f0;
      font-size: 16px;
      text-shadow: 1px 1px 2px black;
    }
    @media (max-width: 600px) {
      #scoreBoard { top: 10px; font-size: 14px; }
    }
    @media (min-width: 601px) {
      #scoreBoard { top: 20px; font-size: 16px; }
    }
    #gameOverScreen {
      display: none;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #0f0;
      font-size: 20px;
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border: 2px solid #0f0;
      cursor: pointer;
      z-index: 2;
    }
    /* Home Screen */
    #homeScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      color: #0f0;
      font-size: 20px;
      text-align: center;
      cursor: pointer;
      z-index: 3;
    }
    /* Mute Music Button */
    #muteButton {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      border: 2px solid #0f0;
      color: #0f0;
      font-size: 16px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      z-index: 4;
    }
  </style>
</head>
<body>
  <!-- Home Screen -->
  <div id="homeScreen">
    <div>ASTROBRAIN</div>
    <div style="margin-top:20px; font-size:14px;">Tap or Press Space to Start</div>
  </div>
  <canvas id="gameCanvas" width="320" height="480"></canvas>
  <div id="joystick"></div>
  <button id="shootButton">🔥</button>
  <div id="scoreBoard">Score: 0 | Level: 1 | High: 0</div>
  <div id="gameOverScreen">GAME OVER<br><br>Tap or Press Space to Restart</div>
  <button id="muteButton">Mute Music</button>
  
  <!-- Background Music -->
  <audio id="backgroundMusic" autoplay muted loop>
    <source src="music3.m4a" type="audio/mp4">
    Your browser does not support the audio element.
  </audio>
  
  <script>
    // Set game state: "home", "playing", "gameover"
    let gameState = "home";
    
    // Get DOM elements
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const homeScreen = document.getElementById("homeScreen");
    const joystick = document.getElementById("joystick");
    const shootButton = document.getElementById("shootButton");
    const scoreBoard = document.getElementById("scoreBoard");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const muteButton = document.getElementById("muteButton");
    const backgroundMusic = document.getElementById("backgroundMusic");
    
    // Unmute music on first interaction
    function enableMusic() {
      backgroundMusic.muted = false;
      backgroundMusic.play();
      document.removeEventListener("click", enableMusic);
    }
    document.addEventListener("click", enableMusic, { once: true });
    backgroundMusic.volume = 0.5;
    
    muteButton.addEventListener("click", function() {
      backgroundMusic.muted = !backgroundMusic.muted;
      muteButton.textContent = backgroundMusic.muted ? "Unmute Music" : "Mute Music";
    });
    
    // Start game from home screen
    function startGame() {
      homeScreen.style.display = "none";
      gameState = "playing";
    }
    homeScreen.addEventListener("click", startGame);
    
    // Load images (spaceship remains your neuron.png)
    const neuronImg = new Image();
    neuronImg.src = "neuron.png";
    const asteroidImg = new Image();
    asteroidImg.src = "bird.png";
    const bgImg = new Image();
    bgImg.src = "space-background.jpg";
    
    // Load sounds
    const shootSound = new Audio("shoot.mp3");
    const explosionSound = new Audio("explosion.mp3");
    const gameOverSound = new Audio("gameover.mp3");
    
    let score = 0;
    let level = 1;
    let highScore = localStorage.getItem("highScore") || 0;
    
    // Particle effects with varied colors
    const particles = [];
    function createParticles(x, y, count) {
      const colors = ["#ff0", "#0f0", "#0ff"];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: x,
          y: y,
          velocity: { x: (Math.random() - 0.5) * 2, y: (Math.random() - 0.5) * 2 },
          lifetime: 30,
          size: Math.random() * 3 + 1,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }
    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].velocity.x;
        particles[i].y += particles[i].velocity.y;
        particles[i].lifetime--;
        if (particles[i].lifetime <= 0) particles.splice(i, 1);
      }
    }
    function drawParticles() {
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      });
    }
    
    // Arrays for power-ups, enemies, enemy bullets
    const powerUps = [];
    const enemies = [];
    const enemyBullets = [];
    
    // Power-ups: 70% shield, 30% multishot
    function spawnPowerUp() {
      const size = 20;
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const type = Math.random() < 0.7 ? "shield" : "multishot";
      powerUps.push({ x, y, size, type });
    }
    setInterval(spawnPowerUp, 15000);
    
    // Player object with support for shield and multishot
    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      width: 40,
      height: 40,
      rotation: 0,
      velocity: { x: 0, y: 0 },
      thrusting: false,
      shieldActive: false,
      shieldTimer: 0,
      multishot: false,
      multishotTimer: 0,
      draw: function() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.drawImage(neuronImg, -this.width / 2, -this.height / 2, this.width, this.height);
        if (this.shieldActive) {
          ctx.beginPath();
          ctx.arc(0, 0, this.width, 0, Math.PI * 2);
          ctx.strokeStyle = "#0ff";
          ctx.lineWidth = 3;
          ctx.stroke();
        }
        ctx.restore();
      },
      update: function() {
        if (gameState !== "playing") return;
        if (this.thrusting) {
          this.velocity.x += Math.cos(this.rotation) * 0.03;
          this.velocity.y += Math.sin(this.rotation) * 0.03;
        }
        this.velocity.x *= 0.98;
        this.velocity.y *= 0.98;
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        wrapAround(this);
        if (this.shieldActive) {
          this.shieldTimer--;
          if (this.shieldTimer <= 0) this.shieldActive = false;
        }
        if (this.multishot) {
          this.multishotTimer--;
          if (this.multishotTimer <= 0) this.multishot = false;
        }
        checkPlayerCollision();
        checkPowerUpCollision();
      }
    };
    
    // Asteroids with random size (20-50) and speed inversely proportional to size
    const asteroids = [];
    function createAsteroid() {
      let size = Math.random() * 30 + 20; // 20 to 50
      let x = Math.random() * canvas.width;
      let y = Math.random() * canvas.height;
      const minDistance = player.width + size;
      let attempts = 0;
      while (attempts < 10) {
        const dx = x - player.x;
        const dy = y - player.y;
        if (Math.sqrt(dx * dx + dy * dy) < minDistance) {
          x = Math.random() * canvas.width;
          y = Math.random() * canvas.height;
          attempts++;
        } else {
          break;
        }
      }
      const baseSpeed = (40 / size);
      const speedMultiplier = baseSpeed * (1 + (level - 1) * 0.1);
      asteroids.push({
        x, y, size,
        velocity: {
          x: (Math.random() * 1.2 - 0.6) * speedMultiplier,
          y: (Math.random() * 1.2 - 0.6) * speedMultiplier
        }
      });
    }
    function drawAsteroids() {
      asteroids.forEach(ast => {
        ctx.drawImage(asteroidImg, ast.x - ast.size/2, ast.y - ast.size/2, ast.size, ast.size);
      });
    }
    function updateAsteroids() {
      if (gameState !== "playing") return;
      asteroids.forEach(ast => {
        ast.x += ast.velocity.x;
        ast.y += ast.velocity.y;
        wrapAround(ast);
      });
    }
    
    // Player bullets
    const bullets = [];
    function shootBullet() {
      if (gameState !== "playing") return;
      if (player.multishot) {
        const offset = 0.1;
        bullets.push({
          x: player.x,
          y: player.y,
          velocity: { x: Math.cos(player.rotation - offset) * 3, y: Math.sin(player.rotation - offset) * 3 },
          lifetime: 60
        });
        bullets.push({
          x: player.x,
          y: player.y,
          velocity: { x: Math.cos(player.rotation + offset) * 3, y: Math.sin(player.rotation + offset) * 3 },
          lifetime: 60
        });
      } else {
        bullets.push({
          x: player.x,
          y: player.y,
          velocity: { x: Math.cos(player.rotation) * 3, y: Math.sin(player.rotation) * 3 },
          lifetime: 60
        });
      }
      shootSound.currentTime = 0;
      shootSound.play();
    }
    function updateBullets() {
      if (gameState !== "playing") return;
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].velocity.x;
        bullets[i].y += bullets[i].velocity.y;
        bullets[i].lifetime--;
        wrapAround(bullets[i]);
        if (bullets[i].lifetime <= 0) bullets.splice(i, 1);
      }
    }
    function drawBullets() {
      bullets.forEach(bullet => {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
      });
    }
    
    // Enemy bullets
    function updateEnemyBullets() {
      if (gameState !== "playing") return;
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        enemyBullets[i].x += enemyBullets[i].velocity.x;
        enemyBullets[i].y += enemyBullets[i].velocity.y;
        enemyBullets[i].lifetime--;
        wrapAround(enemyBullets[i]);
        if (enemyBullets[i].lifetime <= 0) enemyBullets.splice(i, 1);
      }
    }
    function drawEnemyBullets() {
      enemyBullets.forEach(bullet => {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "#f00";
        ctx.fill();
      });
    }
    
    // Enemies (start at level 3)
    function createEnemy() {
      let x = Math.random() < 0.5 ? 0 : canvas.width;
      let y = Math.random() * canvas.height;
      enemies.push({
        x: x,
        y: y,
        width: 30,
        height: 30,
        rotation: 0,
        shootTimer: 120,
        speed: 1.5 + (level >= 3 ? (level - 3) * 0.1 : 0)
      });
    }
    function updateEnemies() {
      if (gameState !== "playing") return;
      enemies.forEach(enemy => {
        enemy.rotation = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        enemy.velocity = {
          x: Math.cos(enemy.rotation) * enemy.speed,
          y: Math.sin(enemy.rotation) * enemy.speed
        };
        enemy.x += enemy.velocity.x;
        enemy.y += enemy.velocity.y;
        wrapAround(enemy);
        enemy.shootTimer--;
        if (enemy.shootTimer <= 0) {
          enemyBullets.push({
            x: enemy.x,
            y: enemy.y,
            velocity: { x: Math.cos(enemy.rotation) * 2, y: Math.sin(enemy.rotation) * 2 },
            lifetime: 120
          });
          enemy.shootTimer = 120;
        }
      });
    }
    function drawEnemies() {
      enemies.forEach(enemy => {
        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        ctx.rotate(enemy.rotation);
        ctx.beginPath();
        ctx.moveTo(-enemy.width / 2, enemy.height / 2);
        ctx.lineTo(enemy.width / 2, enemy.height / 2);
        ctx.lineTo(0, -enemy.height / 2);
        ctx.closePath();
        ctx.fillStyle = "#f00";
        ctx.fill();
        ctx.restore();
      });
    }
    
    // Collision detection: player bullets vs. asteroids
    function checkCollisions() {
      // Bullets vs. asteroids
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = asteroids.length - 1; j >= 0; j--) {
          let dx = bullets[i].x - asteroids[j].x;
          let dy = bullets[i].y - asteroids[j].y;
          if (Math.sqrt(dx * dx + dy * dy) < asteroids[j].size / 2) {
            let size = asteroids[j].size;
            score += Math.floor(size);
            updateScore();
            createParticles(asteroids[j].x, asteroids[j].y, 20);
            explosionSound.currentTime = 0;
            explosionSound.play();
            asteroids.splice(j, 1);
            bullets.splice(i, 1);
            if (size > 20) {
              createAsteroid();
              createAsteroid();
            }
            break;
          }
        }
      }
      // Enemy bullets vs. player
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        let dx = enemyBullets[i].x - player.x;
        let dy = enemyBullets[i].y - player.y;
        if (Math.sqrt(dx * dx + dy * dy) < 15 && !player.shieldActive) {
          gameState = "gameover";
          gameOverSound.play();
          updateHighScore();
          gameOverScreen.innerHTML = `GAME OVER<br>Score: ${score}<br>Level: ${level}<br>High Score: ${highScore}<br><br>Tap or Press Space to Restart`;
          gameOverScreen.style.display = "block";
        }
      }
    }
    
    // Collision: player vs. asteroids
    function checkPlayerCollision() {
      if (player.shieldActive) return;
      for (let ast of asteroids) {
        let dx = player.x - ast.x;
        let dy = player.y - ast.y;
        if (Math.sqrt(dx * dx + dy * dy) < ast.size / 2 + player.width / 2) {
          gameState = "gameover";
          gameOverSound.play();
          updateHighScore();
          gameOverScreen.innerHTML = `GAME OVER<br>Score: ${score}<br>Level: ${level}<br>High Score: ${highScore}<br><br>Tap or Press Space to Restart`;
          gameOverScreen.style.display = "block";
        }
      }
    }
    
    // Collision: player vs. power-ups
    function checkPowerUpCollision() {
      for (let i = powerUps.length - 1; i >= 0; i--) {
        let dx = player.x - powerUps[i].x;
        let dy = player.y - powerUps[i].y;
        if (Math.sqrt(dx * dx + dy * dy) < powerUps[i].size / 2 + player.width / 2) {
          if (powerUps[i].type === "shield") {
            player.shieldActive = true;
            player.shieldTimer = 300;
          } else if (powerUps[i].type === "multishot") {
            player.multishot = true;
            player.multishotTimer = 300;
          }
          powerUps.splice(i, 1);
        }
      }
    }
    
    // Wrap objects around the canvas
    function wrapAround(obj) {
      if (obj.x < 0) obj.x = canvas.width;
      if (obj.x > canvas.width) obj.x = 0;
      if (obj.y < 0) obj.y = canvas.height;
      if (obj.y > canvas.height) obj.y = 0;
    }
    
    // Update score and level (increase level when score threshold reached)
    function updateScore() {
      scoreBoard.textContent = "Score: " + score + " | Level: " + level + " | High: " + highScore;
      if (score >= level * 100) {
        level++;
        // Spawn one new asteroid per level increase
        createAsteroid();
        if (level >= 3 && enemies.length < level - 2) {
          createEnemy();
        }
      }
    }
    
    // Update high score in localStorage
    function updateHighScore() {
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
      }
    }
    
    // Draw background
    function drawBackground() {
      if (bgImg.complete && bgImg.naturalWidth !== 0) {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }
    
    // Restart game on game over screen click
    gameOverScreen.addEventListener("click", function() {
      location.reload();
    });
    
    // Mobile controls: Joystick and shoot button
    joystick.addEventListener("touchmove", function(event) {
      event.preventDefault();
      const touch = event.touches[0];
      const rect = joystick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const angle = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
      player.rotation = angle;
      player.thrusting = true;
    });
    joystick.addEventListener("touchend", function(event) {
      event.preventDefault();
      player.thrusting = false;
    });
    shootButton.addEventListener("click", function(event) {
      event.preventDefault();
      shootBullet();
    });
    
    // Keyboard controls: arrows to move, space to shoot or restart/start game
    document.addEventListener("keydown", function(event) {
      if (gameState === "home" && event.key === " ") {
        startGame();
        return;
      }
      if (gameState === "gameover" && event.key === " ") {
        location.reload();
        return;
      }
      if (gameState !== "playing") return;
      switch (event.key) {
        case "ArrowLeft":
          player.rotation -= 0.5;
          break;
        case "ArrowRight":
          player.rotation += 0.5;
          break;
        case "ArrowUp":
          player.thrusting = true;
          break;
        case " ":
          shootBullet();
          break;
      }
    });
    document.addEventListener("keyup", function(event) {
      if (event.key === "ArrowUp") {
        player.thrusting = false;
      }
    });
    
    // Create initial asteroids (reduced count)
    for (let i = 0; i < 2; i++) {
      createAsteroid();
    }
    
    // Main game loop
    function gameLoop() {
      drawBackground();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      
      if (gameState === "playing") {
        player.update();
        updateAsteroids();
        updateBullets();
        updateEnemyBullets();
        updateEnemies();
        updateParticles();
        checkCollisions();
      }
      
      player.draw();
      drawAsteroids();
      drawBullets();
      drawEnemyBullets();
      drawParticles();
      
      // Draw power-ups
      powerUps.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = (p.type === "shield") ? "#f0f" : "#ff0";
        ctx.fill();
      });
      
      drawEnemies();
      
      requestAnimationFrame(gameLoop);
    }
    gameLoop();
  </script>
</body>
</html>
