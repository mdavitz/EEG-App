<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Astrobrain – Upgraded Asteroids</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: black;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      position: relative;
    }
    /* Use CSS background as a fallback */
    canvas {
      background: url('space-background.jpg') no-repeat center center / cover;
      border: 2px solid #0f0;
      box-shadow: 0 0 10px #0f0;
    }
    #joystick {
      position: absolute;
      left: 10%;
      bottom: 10%;
      width: 80px;
      height: 80px;
      background: rgba(0,255,0,0.5);
      border-radius: 50%;
      touch-action: none;
    }
    #shootButton {
      position: absolute;
      right: 10%;
      bottom: 10%;
      width: 60px;
      height: 60px;
      background: rgba(255,0,0,0.5);
      border-radius: 50%;
      touch-action: none;
      font-size: 16px;
      color: white;
      text-align: center;
      line-height: 60px;
      font-family: 'Press Start 2P', monospace;
      border: none;
    }
    #scoreBoard {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #0f0;
      font-size: 16px;
      text-shadow: 1px 1px 2px black;
    }
    #gameOverScreen {
      display: none;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #0f0;
      font-size: 20px;
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border: 2px solid #0f0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="320" height="480"></canvas>
  <div id="joystick"></div>
  <button id="shootButton">🔥</button>
  <div id="scoreBoard">Score: 0 | Level: 1 | High: 0</div>
  <div id="gameOverScreen">GAME OVER<br><br>Tap to Restart</div>

  <script>
    // Get DOM elements
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const joystick = document.getElementById("joystick");
    const shootButton = document.getElementById("shootButton");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const scoreBoard = document.getElementById("scoreBoard");

    // Load images
    const neuronImg = new Image();
    neuronImg.src = "neuron.png";
    const asteroidImg = new Image();
    asteroidImg.src = "bird.png";
    const bgImg = new Image();
    bgImg.src = "space-background.jpg"; // This image may not load; fallback is provided

    // Load sounds (ensure these files exist)
    const shootSound = new Audio("shoot.mp3");
    const explosionSound = new Audio("explosion.mp3");
    const gameOverSound = new Audio("gameover.mp3");

    let gameState = "playing";
    let score = 0;
    let level = 1;
    let highScore = localStorage.getItem("highScore") || 0;

    // Particle effects for explosions
    const particles = [];

    // Arrays for power-ups, enemies, and enemy bullets
    const powerUps = [];
    const enemies = [];
    const enemyBullets = [];

    // Spawn a power-up every 15 seconds (shield type)
    function spawnPowerUp() {
      const type = "shield";
      const size = 20;
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      powerUps.push({ x, y, size, type });
    }
    setInterval(spawnPowerUp, 15000);

    // Player object with improved acceleration (0.03)
    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      width: 40,
      height: 40,
      rotation: 0,
      velocity: { x: 0, y: 0 },
      thrusting: false,
      shieldActive: false,
      shieldTimer: 0,
      draw: function() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.drawImage(neuronImg, -this.width/2, -this.height/2, this.width, this.height);
        if (this.shieldActive) {
          ctx.beginPath();
          ctx.arc(0, 0, this.width, 0, Math.PI * 2);
          ctx.strokeStyle = "#0ff";
          ctx.lineWidth = 3;
          ctx.stroke();
        }
        ctx.restore();
      },
      update: function() {
        if (gameState !== "playing") return;
        if (this.thrusting) {
          this.velocity.x += Math.cos(this.rotation) * 0.03;
          this.velocity.y += Math.sin(this.rotation) * 0.03;
        }
        this.velocity.x *= 0.98;
        this.velocity.y *= 0.98;
        this.x += this.velocity.x;
        this.y += this.velocity.y;
        wrapAround(this);
        if (this.shieldActive) {
          this.shieldTimer--;
          if (this.shieldTimer <= 0) this.shieldActive = false;
        }
        checkPlayerCollision();
        checkPowerUpCollision();
      }
    };

    // Asteroids
    const asteroids = [];
    function createAsteroid(size = 40, x = Math.random() * canvas.width, y = Math.random() * canvas.height) {
      const speedMultiplier = 1 + (level - 1) * 0.1;
      asteroids.push({
        x, y, size,
        velocity: {
          x: (Math.random() * 1.2 - 0.6) * speedMultiplier,
          y: (Math.random() * 1.2 - 0.6) * speedMultiplier
        }
      });
    }
    function drawAsteroids() {
      asteroids.forEach(ast => {
        ctx.drawImage(asteroidImg, ast.x - ast.size/2, ast.y - ast.size/2, ast.size, ast.size);
      });
    }
    function updateAsteroids() {
      if (gameState !== "playing") return;
      asteroids.forEach(ast => {
        ast.x += ast.velocity.x;
        ast.y += ast.velocity.y;
        wrapAround(ast);
      });
    }

    // Player bullets
    const bullets = [];
    function shootBullet() {
      if (gameState !== "playing") return;
      bullets.push({
        x: player.x,
        y: player.y,
        velocity: {
          x: Math.cos(player.rotation) * 3,
          y: Math.sin(player.rotation) * 3
        },
        lifetime: 60
      });
      shootSound.currentTime = 0;
      shootSound.play();
    }
    function updateBullets() {
      if (gameState !== "playing") return;
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].x += bullets[i].velocity.x;
        bullets[i].y += bullets[i].velocity.y;
        bullets[i].lifetime--;
        wrapAround(bullets[i]);
        if (bullets[i].lifetime <= 0) bullets.splice(i, 1);
      }
    }
    function drawBullets() {
      bullets.forEach(bullet => {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
      });
    }

    // Enemy bullets (fired by enemies)
    function updateEnemyBullets() {
      if (gameState !== "playing") return;
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        enemyBullets[i].x += enemyBullets[i].velocity.x;
        enemyBullets[i].y += enemyBullets[i].velocity.y;
        enemyBullets[i].lifetime--;
        wrapAround(enemyBullets[i]);
        if (enemyBullets[i].lifetime <= 0) enemyBullets.splice(i, 1);
      }
    }
    function drawEnemyBullets() {
      enemyBullets.forEach(bullet => {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "#f00";
        ctx.fill();
      });
    }

    // Enemies (start appearing at level 3)
    function createEnemy() {
      let x = Math.random() < 0.5 ? 0 : canvas.width;
      let y = Math.random() * canvas.height;
      enemies.push({
        x, y,
        width: 30,
        height: 30,
        rotation: 0,
        shootTimer: 120, // enemy fires roughly every 2 seconds
        speed: 1.5
      });
    }
    function updateEnemies() {
      if (gameState !== "playing") return;
      enemies.forEach(enemy => {
        enemy.rotation = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        enemy.velocity = {
          x: Math.cos(enemy.rotation) * enemy.speed,
          y: Math.sin(enemy.rotation) * enemy.speed
        };
        enemy.x += enemy.velocity.x;
        enemy.y += enemy.velocity.y;
        wrapAround(enemy);
        enemy.shootTimer--;
        if (enemy.shootTimer <= 0) {
          enemyBullets.push({
            x: enemy.x,
            y: enemy.y,
            velocity: {
              x: Math.cos(enemy.rotation) * 2,
              y: Math.sin(enemy.rotation) * 2
            },
            lifetime: 120
          });
          enemy.shootTimer = 120;
        }
      });
    }
    function drawEnemies() {
      enemies.forEach(enemy => {
        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        ctx.rotate(enemy.rotation);
        ctx.beginPath();
        ctx.moveTo(-enemy.width/2, enemy.height/2);
        ctx.lineTo(enemy.width/2, enemy.height/2);
        ctx.lineTo(0, -enemy.height/2);
        ctx.closePath();
        ctx.fillStyle = "#f00";
        ctx.fill();
        ctx.restore();
      });
    }

    // Particle explosion effects
    function createParticles(x, y, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          velocity: {
            x: (Math.random() - 0.5) * 2,
            y: (Math.random() - 0.5) * 2
          },
          lifetime: 30,
          size: Math.random() * 3 + 1
        });
      }
    }
    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].velocity.x;
        particles[i].y += particles[i].velocity.y;
        particles[i].lifetime--;
        if (particles[i].lifetime <= 0) particles.splice(i, 1);
      }
    }
    function drawParticles() {
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "#ff0";
        ctx.fill();
      });
    }

    // Draw power-ups
    function drawPowerUps() {
      powerUps.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "#f0f";
        ctx.fill();
      });
    }

    // Collision detection: bullets vs. asteroids and enemy bullets vs. player
    function checkCollisions() {
      // Bullets vs. asteroids
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = asteroids.length - 1; j >= 0; j--) {
          let dx = bullets[i].x - asteroids[j].x;
          let dy = bullets[i].y - asteroids[j].y;
          if (Math.sqrt(dx * dx + dy * dy) < asteroids[j].size / 2) {
            let size = asteroids[j].size;
            score += Math.floor(size);
            updateScore();
            createParticles(asteroids[j].x, asteroids[j].y, 20);
            explosionSound.currentTime = 0;
            explosionSound.play();
            asteroids.splice(j, 1);
            bullets.splice(i, 1);
            if (size > 20) {
              createAsteroid(size / 2);
              createAsteroid(size / 2);
            }
            break;
          }
        }
      }
      // Enemy bullets vs. player
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        let dx = enemyBullets[i].x - player.x;
        let dy = enemyBullets[i].y - player.y;
        if (Math.sqrt(dx * dx + dy * dy) < 15 && !player.shieldActive) {
          gameState = "gameover";
          gameOverSound.play();
          updateHighScore();
          gameOverScreen.innerHTML = `GAME OVER<br>Score: ${score}<br>Level: ${level}<br>High Score: ${highScore}<br><br>Tap to Restart`;
          gameOverScreen.style.display = "block";
        }
      }
    }

    // Collision: player vs. asteroids
    function checkPlayerCollision() {
      if (player.shieldActive) return;
      for (let ast of asteroids) {
        let dx = player.x - ast.x;
        let dy = player.y - ast.y;
        if (Math.sqrt(dx * dx + dy * dy) < ast.size / 2 + player.width / 2) {
          gameState = "gameover";
          gameOverSound.play();
          updateHighScore();
          gameOverScreen.innerHTML = `GAME OVER<br>Score: ${score}<br>Level: ${level}<br>High Score: ${highScore}<br><br>Tap to Restart`;
          gameOverScreen.style.display = "block";
        }
      }
    }

    // Collision: player vs. power-ups
    function checkPowerUpCollision() {
      for (let i = powerUps.length - 1; i >= 0; i--) {
        let dx = player.x - powerUps[i].x;
        let dy = player.y - powerUps[i].y;
        if (Math.sqrt(dx * dx + dy * dy) < powerUps[i].size / 2 + player.width / 2) {
          if (powerUps[i].type === "shield") {
            player.shieldActive = true;
            player.shieldTimer = 300;
          }
          powerUps.splice(i, 1);
        }
      }
    }

    // Wrap objects around screen edges
    function wrapAround(obj) {
      if (obj.x < 0) obj.x = canvas.width;
      if (obj.x > canvas.width) obj.x = 0;
      if (obj.y < 0) obj.y = canvas.height;
      if (obj.y > canvas.height) obj.y = 0;
    }

    // Update score, level, and spawn enemies
    function updateScore() {
      scoreBoard.textContent = "Score: " + score + " | Level: " + level + " | High: " + highScore;
      if (score >= level * 100) {
        level++;
        for (let i = 0; i < level; i++) {
          createAsteroid();
        }
        if (level >= 3 && enemies.length < level - 2) {
          createEnemy();
        }
      }
    }

    // Update high score in localStorage
    function updateHighScore() {
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
      }
    }

    // Draw background image on canvas with fallback to black
    function drawBackground() {
      if (bgImg.complete && bgImg.naturalWidth !== 0) {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    // Restart game on game over screen click
    gameOverScreen.addEventListener("click", function() {
      location.reload();
    });

    // Mobile: Joystick control using getBoundingClientRect
    joystick.addEventListener("touchmove", function(event) {
      event.preventDefault();
      const touch = event.touches[0];
      const rect = joystick.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const angle = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
      player.rotation = angle;
      player.thrusting = true;
    });
    joystick.addEventListener("touchend", function(event) {
      event.preventDefault();
      player.thrusting = false;
    });
    shootButton.addEventListener("click", function(event) {
      event.preventDefault();
      shootBullet();
    });

    // Keyboard controls: arrow keys for rotation/thrust and spacebar to shoot
    document.addEventListener("keydown", function(event) {
      if (gameState !== "playing") return;
      switch (event.key) {
        case "ArrowLeft":
          player.rotation -= 0.1;
          break;
        case "ArrowRight":
          player.rotation += 0.1;
          break;
        case "ArrowUp":
          player.thrusting = true;
          break;
        case " ":
          shootBullet();
          break;
      }
    });
    document.addEventListener("keyup", function(event) {
      if (event.key === "ArrowUp") {
        player.thrusting = false;
      }
    });

    // Create initial asteroids
    for (let i = 0; i < 4; i++) {
      createAsteroid();
    }

    // Main game loop
    function gameLoop() {
      // Draw background (fallback will fill with black if image not loaded)
      drawBackground();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      
      if (gameState === "playing") {
        player.update();
        updateAsteroids();
        updateBullets();
        updateEnemyBullets();
        updateEnemies();
        updateParticles();
        checkCollisions();
      }
      player.draw();
      drawAsteroids();
      drawBullets();
      drawEnemyBullets();
      drawParticles();
      drawPowerUps();
      drawEnemies();
      
      requestAnimationFrame(gameLoop);
    }
    gameLoop();
  </script>
</body>
</html>
